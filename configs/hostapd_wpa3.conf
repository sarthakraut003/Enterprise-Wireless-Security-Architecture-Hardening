# WPA3-Enterprise Configuration for 802.1X
interface=wlan0
driver=nl80211
ssid=Secure_Finance_Internal
hw_mode=g
channel=6

# WPA3-Enterprise (WPA-EAP)
wpa=2
wpa_key_mgmt=WPA-EAP-SHA256
ieee80211w=2  # Management Frame Protection (Required for WPA3)
wpa_pairwise=CCMP

# RADIUS Server Integration
auth_server_addr=127.0.0.1
auth_server_port=1812
auth_server_shared_secret=sanitized_secret_key
